name: SpartinaTech Auto Image Generation

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      image_count:
        description: 'Number of images to generate per batch'
        required: false
        default: '30'
        type: string
      model:
        description: 'OpenAI image model to use for generation'
        required: false
        default: 'gpt-image-1'
        type: string

concurrency:
  group: auto-image-gen
  cancel-in-progress: false

jobs:
  generate-and-deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout SpartinaTech repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run auto-generate pipeline
        run: node scripts/auto-generate-pipeline.mjs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_IMAGE_MODEL: ${{ inputs.model || 'gpt-image-1' }}
          IMAGE_COUNT: ${{ inputs.image_count || '30' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          SITE_URL: https://spartina.tech
          GIT_AUTHOR_NAME: "SpartinaTech Auto Bot"
          GIT_AUTHOR_EMAIL: "actions@github.com"

      - name: Commit and push generated images
        run: |
          git config user.name "SpartinaTech Auto Bot"
          git config user.email "actions@github.com"
          git add public/images/auto/
          git commit -m "auto: generate ${IMAGE_COUNT} images for batch $(date -u +%Y%m%d-%H)" || echo "No changes to commit"
          git push
        env:
          IMAGE_COUNT: ${{ inputs.image_count || '30' }}

      - name: Upload generated images artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-generated-images
          path: public/images/auto/
          retention-days: 30
          if-no-files-found: warn
