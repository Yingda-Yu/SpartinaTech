name: ChatGPT Trigger Image Generation

on:
  workflow_dispatch:
    inputs:
      prompt_override:
        description: 'Optional prompt override for image generation'
        required: false
        default: ''
        type: string
      count:
        description: 'Number of images to generate'
        required: false
        default: '30'
        type: string

jobs:
  trigger-generation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main pipeline
        run: |
          echo "ChatGPT Agent triggered image generation"
          echo "Prompt override: ${{ inputs.prompt_override || 'none' }}"
          echo "Count: ${{ inputs.count || '30' }}"

      - name: Dispatch main workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-image-generation.yml',
              ref: 'main',
              inputs: {
                image_count: "${{ inputs.count || '30' }}"
              }
            });
